<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0waste AI Assistant</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <div class="logo-container">
                <div class="logo-icon">🌱</div>
                <h1>0waste Assistant</h1>
            </div>
            <p class="subtitle">Solusi cerdas untuk sisa makanan berkualitas.</p>
        </header>
        
        <div class="chat-box" id="chat-box">
            <!-- Pesan selamat datang statis -->
            <div class="message bot-message">
                <div class="message-content">
                    Halo! Selamat datang di <strong>0waste</strong>. Senang sekali kamu bergabung dalam gerakan untuk menjaga bumi kita.<br><br>Ada yang bisa saya bantu hari ini terkait makanan diskon dari restoran atau hotel partner kami?
                </div>
            </div>
        </div>

        <div class="chat-input-container">
            <input type="text" id="user-input" placeholder="Tanyakan seputar pesanan atau layanan kami..." autocomplete="off">
            <button id="send-button" disabled>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M22 2L15 22L11 13L2 9L22 2Z" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
